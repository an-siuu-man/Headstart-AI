name: Bug Report
description: Report a reproducible problem in Headstart.
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide clear reproduction details so we can investigate quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the issue.
      placeholder: Describe the bug and where it occurs...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: List the exact steps required to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: Describe the expected result...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What happened instead?
      placeholder: Describe the observed result...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser/app version, and any relevant runtime details.
      placeholder: "Example: Windows 11, Chrome 132, Node 20.11"
    validations:
      required: true

  - type: textarea
    id: logs-screenshots
    attributes:
      label: Logs or Screenshots
      description: Paste relevant logs, stack traces, or screenshots.
      placeholder: Attach screenshots or paste logs here...
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any related context, links, or notes that may help.
      placeholder: Add any other context here...
    validations:
      required: false
